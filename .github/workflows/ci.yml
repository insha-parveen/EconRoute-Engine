name: CI

on:
  push:
    branches: [main, week-*]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: econroute
          POSTGRES_PASSWORD: econroute
          POSTGRES_DB: econroute
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U econroute"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install --no-cache-dir torch --index-url https://download.pytorch.org/whl/cpu
          pip install --no-cache-dir -r requirements-dev.txt -r requirements.txt

      - name: Lint with ruff (autofix then verify)
        run: |
          pip install ruff
          ruff check gateway/ tracking/ providers/ tests/ --fix
          ruff check gateway/ tracking/ providers/ tests/

      - name: Test with pytest
        env:
          DATABASE_URL: postgresql+asyncpg://econroute:econroute@localhost:5432/econroute
          REDIS_URL: redis://localhost:6379
          GROQ_API_KEY: gsk_test_key_for_ci
        run: |
          pip install pytest pytest-asyncio httpx
          pytest tests/ -v --timeout=30

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

  docker:
    runs-on: ubuntu-latest
    needs: [backend, frontend]

    steps:
      - uses: actions/checkout@v4

      - name: Build production Docker image
        run: docker build -f Dockerfile.prod -t econroute/gateway:latest .

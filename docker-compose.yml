
# EconRoute — all services in one command: docker-compose up -d
# Services: FastAPI gateway, Redis (cache), PostgreSQL (logs), Prometheus (metrics)

services:

  # ─── 1. FastAPI Gateway ──────────────────────────────────────────────────────
  gateway:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: econroute_gateway
    ports:
      - "8000:8000" # localhost:8000 → container:8000
    env_file:
      - .env # loads GROQ_API_KEY, DATABASE_URL, REDIS_URL, etc.
    depends_on:
      redis:
        condition: service_healthy # wait for Redis before starting
      postgres:
        condition: service_healthy # wait for Postgres before starting
    volumes:
      - .:/app # live code reload during development
    restart: unless-stopped

  # ─── 2. Redis (Semantic Cache) ───────────────────────────────────────────────
  redis:
    image: redis:7-alpine # alpine = tiny image (~7 MB)
    container_name: econroute_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ] # redis-cli ping → PONG = healthy
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # ─── 3. PostgreSQL (Request Logs + Cost Tracking) ────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: econroute_postgres
    environment:
      POSTGRES_USER: econroute
      POSTGRES_PASSWORD: econroute
      POSTGRES_DB: econroute
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data # persist across restarts
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER}" ]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # ─── 4. Streamlit Dashboard (Cost Analytics — Week 4) ────────────────────────
  dashboard:
    build:
      context: .
      dockerfile: Dockerfile # reuses the gateway image (deps already installed)
    container_name: econroute_dashboard
    command: >
      streamlit run dashboard/app.py
      --server.port 8501 --server.address 0.0.0.0
    environment:
      # In-compose Postgres host is 'postgres'; sync psycopg2 URL for the dashboard.
      DASHBOARD_DATABASE_URL: postgresql+psycopg2://econroute:econroute@postgres:5432/econroute
    ports:
      - "8501:8501" # localhost:8501 → Streamlit
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - .:/app # live reload of dashboard code
    restart: unless-stopped

  # ─── 5. Prometheus (Metrics Scraper) ─────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: econroute_prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml # config (created below)
    restart: unless-stopped

  # ─── 6. Next.js Frontend (Cost Dashboard — Week 5) ───────────────────────────
  # Uses the STOCK node:20-alpine image (no custom build) + a volume mount, then
  # installs deps and runs the dev server on first start. This deliberately avoids
  # `docker build` for the frontend — building a Next image locally previously hit
  # "no space left on device". node_modules lives in an anonymous volume so the
  # container's Linux modules don't clash with the host (Windows) checkout.
  # NEXT_PUBLIC_* are browser-side, so they point at localhost:8000 on the HOST,
  # not the compose service name.
  frontend:
    image: node:20-alpine
    container_name: econroute_frontend
    working_dir: /app/frontend
    command: sh -c "npm install && npm run dev"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
      NEXT_PUBLIC_WS_URL: ws://localhost:8000/ws/requests
    ports:
      - "3000:3000" # localhost:3000 → Next.js dev server
    volumes:
      - ./frontend:/app/frontend
      - /app/frontend/node_modules # anonymous volume: keep container modules off the host
    depends_on:
      - gateway
    restart: unless-stopped

# ─── Named Volumes ────────────────────────────────────────────────────────────
volumes:
  postgres_data: # postgres data lives here even after docker-compose down
